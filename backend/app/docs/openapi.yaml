# backend/app/docs/openapi.yaml

openapi: 3.0.0
info:
  title: Academic-to-Industry Transition API
  description: API for Intelligent Academic-to-Industry Transition Support System
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Development server

paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
                full_name:
                  type: string
      responses:
        201:
          description: User registered successfully
        400:
          description: Bad request
        409:
          description: User already exists

  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  user:
                    type: object
        401:
          description: Invalid credentials

  /resume/upload:
    post:
      summary: Upload a resume
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        201:
          description: Resume uploaded successfully
        400:
          description: Invalid file

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT