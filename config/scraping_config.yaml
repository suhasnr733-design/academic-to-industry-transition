# config/scraping_config.yaml

scraping:
  job_portals:
    - name: naukri
      url: https://www.naukri.com/
      selectors:
        job_title: 'div.jobTuple h3'
        company: 'div.jobTuple span.basicInformation'
        location: 'div.jobTuple span.location'
        skills: 'ul.tags li'
      rate_limit: 2  # seconds
      max_pages: 100
    
    - name: linkedin
      url: https://www.linkedin.com/jobs/
      selectors:
        job_title: 'h3.base-search-card__title'
        company: 'h4.base-search-card__subtitle'
        location: 'span.job-search-card__location'
        skills: 'div.description__text'
      rate_limit: 3
      max_pages: 50
    
    - name: indeed
      url: https://www.indeed.com/
      selectors:
        job_title: 'h2.jobTitle'
        company: 'span.companyName'
        location: 'div.companyLocation'
        skills: 'div.job-snippet'
      rate_limit: 1.5
      max_pages: 200
    
  course_platforms:
    - name: coursera
      api_url: https://api.coursera.org/api/courses.v1
      rate_limit: 1
      max_items: 1000
    
    - name: udemy
      api_url: https://www.udemy.com/api-2.0/courses/
      rate_limit: 1
      max_items: 500
    
    - name: nptel
      api_url: https://nptel.ac.in/api/v1/
      rate_limit: 1
      max_items: 500